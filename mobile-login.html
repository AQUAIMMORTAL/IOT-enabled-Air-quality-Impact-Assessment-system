<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a4a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Aeromatrics — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script>
  // Unregister service worker on mobile login page — it intercepts Firebase requests
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(reg => reg.unregister());
    });
  }
</script>
<script>
// Step 1 — fetch remote config
window.__aeroConfigReady = (async () => {
  const CF_BASE_BOOTSTRAP = 'https://asia-southeast1-aerometrics-b5c84.cloudfunctions.net';
  try {
    const res = await fetch(`${CF_BASE_BOOTSTRAP}/getClientConfig`);
    if (!res.ok) throw new Error(`Config fetch failed: ${res.status}`);
    const cfg = await res.json();
    window.FIREBASE_CONFIG   = cfg.firebaseConfig;
    window.AERO_CF_BASE      = cfg.cfBase;
    window.AERO_VAPID_KEY    = cfg.vapidPublicKey;
    window.AERO_IQAIR_BUDGET = cfg.iqairBudget;
  } catch (e) {
    window.FIREBASE_CONFIG = null;
  }
})();

// Step 2 — promise that resolves once AeroAuth is available on window
window.__aeroReady = new Promise(resolve => {
  // firebase-backend.js is type=module — it runs after inline scripts
  // Poll until AeroAuth is attached
  const check = () => {
    if (window.AeroAuth && window.AeroUI) resolve();
    else setTimeout(check, 50);
  };
  check();
});
</script>
<script type="module" src="firebase-backend.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mono: 'Share Tech Mono', monospace;
    --display: 'Rajdhani', sans-serif;
    --green: #4ade80;
    --green-dark: #16a34a;
  }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    font-family: var(--display);
  }

  /* ── Full screen background ── */
  #mobileLoginPage {
    position: fixed; inset: 0;
    background: url('mobile_login.jpg') center center / cover no-repeat;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 0;
  }

  /* Soft gradient at the bottom so form is readable */
  #mobileLoginPage::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0%,
      rgba(0,0,0,0) 30%,
      rgba(5,20,8,0.55) 60%,
      rgba(5,20,8,0.82) 100%
    );
    pointer-events: none;
  }

  /* ── Brand badge at top ── */
  .m-brand {
    position: absolute;
    top: 48px; left: 0; right: 0;
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    z-index: 10;
  }
  .m-brand-icon {
    width: 48px; height: 48px;
    border: 1.5px solid rgba(74,222,128,.7);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; color: var(--green);
    box-shadow: 0 0 20px rgba(74,222,128,.35);
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(6px);
  }
  .m-brand-name {
    font-family: var(--display);
    font-size: 1.6rem; font-weight: 700;
    letter-spacing: 0.1em; color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
  }
  .m-brand-name span { color: var(--green); }
  .m-brand-sub {
    font-family: var(--mono);
    font-size: 0.6rem; color: rgba(200,240,215,.75);
    letter-spacing: 0.18em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }

  /* ── Bottom form sheet ── */
  .m-sheet {
    position: relative; z-index: 10;
    width: 100%; max-width: 480px;
    background: rgba(4,16,8,0.78);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(74,222,128,.25);
    border-radius: 24px 24px 0 0;
    padding: 28px 28px 40px;
  }

  /* drag handle */
  .m-handle {
    width: 40px; height: 4px;
    background: rgba(74,222,128,.35);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  /* ── Tabs ── */
  .m-tabs {
    display: flex;
    background: rgba(74,222,128,.06);
    border: 1px solid rgba(74,222,128,.2);
    border-radius: 8px;
    padding: 3px; gap: 3px;
    margin-bottom: 20px;
  }
  .m-tab {
    flex: 1; padding: 10px;
    background: transparent; border: none;
    color: rgba(180,230,200,.5);
    font-family: var(--mono); font-size: .78rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; border-radius: 6px;
    transition: all .18s;
  }
  .m-tab.active {
    background: rgba(74,222,128,.18);
    border: 1px solid rgba(74,222,128,.4);
    color: var(--green);
  }

  /* ── Google button ── */
  .m-google-btn {
    width: 100%; padding: 12px;
    border: 1px solid rgba(74,222,128,.3);
    background: rgba(255,255,255,.08);
    color: #e6f4ec;
    font-family: var(--mono); font-size: .78rem; font-weight: 600;
    letter-spacing: 0.06em;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    border-radius: 8px; cursor: pointer;
    transition: all .18s; margin-bottom: 4px;
  }
  .m-google-btn:hover { background: rgba(255,255,255,.14); }

  /* ── Divider ── */
  .m-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 14px 0;
    color: rgba(180,230,200,.5);
    font-size: .6rem; letter-spacing: 0.18em;
    font-family: var(--mono); text-transform: uppercase;
  }
  .m-divider::before, .m-divider::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(74,222,128,.18);
  }

  /* ── Field label ── */
  .m-label {
    display: block;
    font-size: .62rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.16em;
    color: rgba(200,240,215,.7);
    margin-bottom: 6px;
    font-family: var(--mono);
  }

  /* ── Input wrap ── */
  .m-input-wrap {
    position: relative; margin-bottom: 14px;
  }
  .m-input-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: rgba(74,222,128,.6); font-size: .8rem; pointer-events: none;
    font-family: var(--mono);
  }
  .m-input {
    width: 100%; padding: 13px 14px 13px 36px;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(74,222,128,.25);
    border-radius: 8px;
    color: #e6f4ec; font-family: var(--mono); font-size: 16px;
    outline: none; transition: border-color .15s, background .15s;
  }
  .m-input:focus {
    border-color: var(--green);
    background: rgba(74,222,128,.08);
  }
  .m-input::placeholder { color: rgba(180,230,200,.3); }
  .m-input.with-toggle { padding-right: 64px; }

  /* Show/hide password */
  .m-pass-toggle {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.2);
    padding: 4px 10px; color: var(--green);
    font-size: .65rem; font-weight: 700; font-family: var(--mono);
    letter-spacing: 0.1em; cursor: pointer; border-radius: 4px;
    transition: background .15s;
  }
  .m-pass-toggle:hover { background: rgba(74,222,128,.2); }

  /* Forgot password */
  .m-forgot {
    text-align: right; margin-bottom: 10px;
  }
  .m-forgot button {
    background: none; border: none;
    color: var(--green); font-family: var(--mono);
    font-size: .65rem; cursor: pointer;
    text-decoration: underline; letter-spacing: 0.06em;
  }

  /* ── Submit button ── */
  .m-submit {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
    border: none; border-radius: 8px;
    color: #fff; font-family: var(--mono);
    font-size: .85rem; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    cursor: pointer; margin-top: 4px;
    box-shadow: 0 4px 24px rgba(22,163,74,.4);
    transition: opacity .18s, transform .18s;
  }
  .m-submit:hover { opacity: .9; transform: translateY(-1px); }
  .m-submit:active { transform: translateY(0); }
  .m-submit:disabled { opacity: .4; cursor: not-allowed; }

  /* Error */
  .m-error {
    color: #f87171; font-size: .72rem;
    font-family: var(--mono); margin-bottom: 8px;
    display: none;
  }

  /* Toggle text */
  .m-toggle {
    text-align: center; margin-top: 16px;
    font-size: .7rem; font-family: var(--mono);
    color: rgba(180,230,200,.55);
  }
  .m-toggle .m-link {
    color: var(--green); cursor: pointer; font-weight: 700;
    margin-left: 4px;
  }
  .m-toggle .m-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="mobileLoginPage">

  <!-- Brand at top -->
  <div class="m-brand">
    <div class="m-brand-icon">◈</div>
    <div class="m-brand-name">Aero<span>matrics</span></div>
    <div class="m-brand-sub">// INDIA AIR QUALITY MONITORING SYSTEM</div>
  </div>

  <!-- Bottom sheet form -->
  <div class="m-sheet">
    <div class="m-handle"></div>

    <!-- Tabs -->
    <div class="m-tabs">
      <button class="m-tab active" id="m-tab-login"  onclick="mSetTab('login')">Login</button>
      <button class="m-tab"        id="m-tab-signup" onclick="mSetTab('register')">Register</button>
    </div>

    <!-- Google -->
    <button class="m-google-btn" onclick="mGoogleSignIn()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>

    <div class="m-divider">or</div>

    <div class="m-error" id="m-error"></div>

    <!-- Name (register only) -->
    <div id="m-name-wrap" style="display:none;">
      <label class="m-label">Display Name</label>
      <div class="m-input-wrap">
        <span class="m-input-icon">◈</span>
        <input id="m-name" type="text" placeholder="Your name" class="m-input"/>
      </div>
    </div>

    <!-- Email -->
    <label class="m-label">Email Address</label>
    <div class="m-input-wrap">
      <span class="m-input-icon">@</span>
      <input id="m-email" type="email" placeholder="you@example.com" class="m-input"/>
    </div>

    <!-- Password -->
    <label class="m-label">Password</label>
    <div class="m-input-wrap">
      <span class="m-input-icon">⬡</span>
      <input id="m-password" type="password" placeholder="••••••••" class="m-input with-toggle"
             onkeydown="if(event.key==='Enter') mSubmit()"/>
      <button class="m-pass-toggle" onclick="mTogglePass()">SHOW</button>
    </div>

    <!-- Forgot -->
    <div class="m-forgot" id="m-forgot-row">
      <button onclick="mForgotPassword()">Forgot password?</button>
    </div>

    <button class="m-submit" id="m-submit-btn" onclick="mSubmit()">LOGIN</button>

    <div class="m-toggle" id="m-toggle-text">
      Don't have an account?
      <span class="m-link" onclick="mSetTab('register')">Register</span>
    </div>
  </div>

</div>

<script>
  let mCurrentTab = 'login';

  // Wait for both config + AeroAuth to be ready
  function waitReady() {
    return new Promise(resolve => {
      const check = () => {
        if (window.AeroAuth) resolve();
        else setTimeout(check, 50);
      };
      Promise.resolve(window.__aeroConfigReady).then(check);
    });
  }

  function mSetTab(tab) {
    mCurrentTab = tab;
    document.getElementById('m-tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('m-tab-signup').classList.toggle('active', tab === 'register');
    document.getElementById('m-name-wrap').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('m-forgot-row').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('m-submit-btn').textContent = tab === 'login' ? 'LOGIN' : 'REGISTER';
    document.getElementById('m-toggle-text').innerHTML = tab === 'login'
      ? 'Don't have an account? <span class="m-link" onclick="mSetTab('register')">Register</span>'
      : 'Already have an account? <span class="m-link" onclick="mSetTab('login')">Login</span>';
    mShowError('');
  }

  function mShowError(msg) {
    const el = document.getElementById('m-error');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  function mTogglePass() {
    const inp = document.getElementById('m-password');
    const btn = document.querySelector('.m-pass-toggle');
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'HIDE'; }
    else { inp.type = 'password'; btn.textContent = 'SHOW'; }
  }

  async function mGoogleSignIn() {
    console.log('[Mobile] Google sign-in clicked');
    try {
      await waitReady();
      console.log('[Mobile] AeroAuth ready, calling googleLogin');
      const result = await window.AeroAuth.googleLogin();
      if (result && !result.ok && result.error) mShowError(result.error);
    } catch(e) {
      console.error('[Mobile] Google sign-in error:', e);
      mShowError(e.message || 'Google sign-in failed.');
    }
  }

  async function mSubmit() {
    console.log('[Mobile] Submit clicked');
    const email = document.getElementById('m-email').value.trim();
    const pass  = document.getElementById('m-password').value;
    if (!email || !pass) { mShowError('Please enter email and password.'); return; }

    const btn = document.getElementById('m-submit-btn');
    btn.disabled = true;
    btn.textContent = mCurrentTab === 'login' ? 'LOGGING IN...' : 'REGISTERING...';
    mShowError('');

    try {
      await waitReady();
      console.log('[Mobile] AeroAuth ready, submitting');
      let result;
      if (mCurrentTab === 'login') {
        result = await window.AeroAuth.login(email, pass);
      } else {
        const name = (document.getElementById('m-name')?.value || '').trim();
        result = await window.AeroAuth.register(email, pass, name);
      }
      console.log('[Mobile] Auth result:', result);
      if (result.ok) {
        window.location.replace('index.html');
      } else {
        mShowError(result.error || 'Authentication failed.');
      }
    } catch(e) {
      console.error('[Mobile] Submit error:', e);
      mShowError(e.message || 'Something went wrong.');
    }

    btn.disabled = false;
    btn.textContent = mCurrentTab === 'login' ? 'LOGIN' : 'REGISTER';
  }

  async function mForgotPassword() {
    const email = document.getElementById('m-email').value.trim();
    if (!email) { mShowError('Enter your email above first.'); return; }
    await waitReady();
    const result = await window.AeroAuth.resetPassword(email);
    if (result.ok) { mShowError(''); alert('Password reset email sent!'); }
    else mShowError(result.error || 'Reset failed.');
  }

  // Once AeroAuth loads, redirect if already signed in
  waitReady().then(() => {
    if (window.AeroUI) {
      window.AeroUI.updateAuthState = (loggedIn) => {
        if (loggedIn) window.location.replace('index.html');
      };
    }
  });
</script>

</body>
</html>
